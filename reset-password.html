<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - EZvest</title>
  <style>
    :root {
      --primary: #0d9488;
      --secondary: #14b8a6;
      --accent: #334155;
      --text: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #94a3b8;
      --border: #dbe5e7;
      --surface: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(20,184,166,0.12), transparent 34%),
        linear-gradient(180deg, #f8fbfb 0%, #eef6f6 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(15,23,42,0.12);
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .logo p {
      font-size: 13px;
      color: var(--text-secondary);
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #c8d5d8;
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input::placeholder { color: var(--text-tertiary); }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(20,184,166,0.14); }
    .btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg,var(--primary),var(--secondary));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { filter: brightness(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      font-size: 13px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: rgba(239,68,68,0.12); color: #f87171; display: block; }
    .msg.success { background: rgba(13,148,136,0.12); color: var(--primary); display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="assets/images/ezvest-icon.png" alt="EZvest icon" width="58" height="58">
      <h1>EZvest</h1>
    </div>

    <div id="form-section">
      <h2>Set New Password</h2>
      <p class="subtitle">Choose a strong password for your account.</p>

      <div id="msg" class="msg"></div>

      <div class="field">
        <label for="new-password">New Password</label>
        <input id="new-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirm-password">Confirm New Password</label>
        <input id="confirm-password" type="password" placeholder="Repeat new password" autocomplete="new-password"
          onkeydown="if(event.key==='Enter')doReset()">
      </div>
      <button class="btn" id="reset-btn" onclick="doReset()">Reset Password</button>
    </div>

    <div id="success-section" style="display:none;text-align:center">
      <img src="assets/images/ezvest-icon.png" alt="Success" width="52" height="52" style="margin-bottom:12px">
      <h2 style="margin-bottom:8px">Password Updated!</h2>
      <p class="subtitle">Your password has been changed. You can now sign in with your new password.</p>
    </div>

    <a class="back-link" href="index.html">Back to EZvest</a>
  </div>

  <script>
    const resetBtn = document.getElementById('reset-btn');
    const supabaseReady = !!(window.supabase && window.SUPABASE_CONFIG?.url && window.SUPABASE_CONFIG?.anonKey);
    const supabaseClient = supabaseReady
      ? window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey)
      : null;

    function showMsg(type, text) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function ensureRecoverySession() {
      if (!supabaseClient) {
        showMsg('error', 'Supabase is not configured yet.');
        resetBtn.disabled = true;
        return false;
      }
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const code = params.get('code');
      if (code) {
        const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
        if (error) {
          showMsg('error', error.message || 'This reset link is invalid or expired.');
          resetBtn.disabled = true;
          return false;
        }
      }
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        showMsg('error', hashParams.get('error_description') || 'This reset link is invalid or expired.');
        resetBtn.disabled = true;
        return false;
      }
      return true;
    }

    async function doReset() {
      const newPass = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!newPass || !confirm) { showMsg('error', 'Please fill in both fields.'); return; }
      if (newPass.length < 6) { showMsg('error', 'Password must be at least 6 characters.'); return; }
      if (newPass !== confirm) { showMsg('error', 'Passwords do not match.'); return; }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Saving...';

      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPass });
        if (error) {
          showMsg('error', error.message || 'Reset failed. Please try again.');
          resetBtn.disabled = false;
          resetBtn.textContent = 'Reset Password';
          return;
        }
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = '';
      } catch (e) {
        showMsg('error', 'Connection error. Please try again.');
        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset Password';
      }
    }

    ensureRecoverySession();
  </script>
</body>
</html>
