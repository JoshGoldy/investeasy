<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - FinScope</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .logo p {
      font-size: 13px;
      color: #94a3b8;
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #3b82f6; }
    .btn {
      width: 100%;
      padding: 11px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: #2563eb; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      font-size: 13px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: rgba(239,68,68,0.12); color: #f87171; display: block; }
    .msg.success { background: rgba(16,185,129,0.12); color: #34d399; display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #3b82f6;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="52" height="52">
        <line x1="57" y1="57" x2="74" y2="74" stroke="#43A047" stroke-width="10" stroke-linecap="round"/>
        <circle cx="34" cy="34" r="28" fill="#1e293b" stroke="#43A047" stroke-width="8"/>
        <rect x="15" y="41" width="8" height="13" rx="1.5" fill="#1E88E5"/>
        <rect x="27" y="33" width="8" height="21" rx="1.5" fill="#1E88E5"/>
        <rect x="39" y="26" width="8" height="28" rx="1.5" fill="#1E88E5"/>
        <polyline points="19,37 31,27 43,20" fill="none" stroke="#1E88E5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="19" cy="37" r="2.5" fill="#1E88E5"/>
        <circle cx="31" cy="27" r="2.5" fill="#1E88E5"/>
        <circle cx="43" cy="20" r="2.5" fill="#1E88E5"/>
      </svg>
      <h1>FinScope</h1>
    </div>

    <div id="form-section">
      <h2>Set New Password</h2>
      <p class="subtitle">Choose a strong password for your account.</p>

      <div id="msg" class="msg"></div>

      <div class="field">
        <label for="new-password">New Password</label>
        <input id="new-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirm-password">Confirm New Password</label>
        <input id="confirm-password" type="password" placeholder="Repeat new password" autocomplete="new-password"
          onkeydown="if(event.key==='Enter')doReset()">
      </div>
      <button class="btn" id="reset-btn" onclick="doReset()">Reset Password</button>
    </div>

    <div id="success-section" style="display:none;text-align:center">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
      <h2 style="margin-bottom:8px">Password Updated!</h2>
      <p class="subtitle">Your password has been changed. You can now sign in with your new password.</p>
    </div>

    <a class="back-link" href="index.html">Back to FinScope</a>
  </div>

  <script>
    const resetBtn = document.getElementById('reset-btn');
    const supabaseReady = !!(window.supabase && window.SUPABASE_CONFIG?.url && window.SUPABASE_CONFIG?.anonKey);
    const supabaseClient = supabaseReady
      ? window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey)
      : null;

    function showMsg(type, text) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function ensureRecoverySession() {
      if (!supabaseClient) {
        showMsg('error', 'Supabase is not configured yet.');
        resetBtn.disabled = true;
        return false;
      }
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const code = params.get('code');
      if (code) {
        const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
        if (error) {
          showMsg('error', error.message || 'This reset link is invalid or expired.');
          resetBtn.disabled = true;
          return false;
        }
      }
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        showMsg('error', hashParams.get('error_description') || 'This reset link is invalid or expired.');
        resetBtn.disabled = true;
        return false;
      }
      return true;
    }

    async function doReset() {
      const newPass = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!newPass || !confirm) { showMsg('error', 'Please fill in both fields.'); return; }
      if (newPass.length < 6) { showMsg('error', 'Password must be at least 6 characters.'); return; }
      if (newPass !== confirm) { showMsg('error', 'Passwords do not match.'); return; }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Saving...';

      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPass });
        if (error) {
          showMsg('error', error.message || 'Reset failed. Please try again.');
          resetBtn.disabled = false;
          resetBtn.textContent = 'Reset Password';
          return;
        }
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = '';
      } catch (e) {
        showMsg('error', 'Connection error. Please try again.');
        resetBtn.disabled = false;
        resetBtn.textContent = 'Reset Password';
      }
    }

    ensureRecoverySession();
  </script>
</body>
</html>
