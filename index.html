<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinVue — Your Financial View</title>
<meta name="description" content="AI-powered investment analysis, real-time market data, and portfolio tracking.">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinVue">
<meta property="og:title" content="FinVue — Your Financial View">
<meta property="og:description" content="AI-powered investment analysis with 6 elite analysis modes, real-time market data, and portfolio tracking.">
<meta property="og:type" content="website">
<meta property="og:image" content="og-image.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><text x='50' y='68' text-anchor='middle' font-size='52' font-family='sans-serif' font-weight='bold' fill='%2310b981'>FV</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=DM+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;font-family:'Outfit',sans-serif;background:#e2e8f0;height:100%}
body{height:100vh;overflow:hidden;display:flex}
input,textarea,button{font-family:inherit;border:none;outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* ── VARIABLES ────────────────────────────────────────────────── */
:root{
  --bg:#f8fafc;--card:#fff;--dark:#0f172a;--dark2:#1e293b;
  --text:#0f172a;--text2:#334155;--muted:#64748b;--faint:#94a3b8;
  --border:#f1f5f9;--border2:#e2e8f0;
  --green:#10b981;--green-bg:#10b98118;--green-glow:0 0 6px #10b981;
  --red:#ef4444;--red-bg:#ef444418;
  --blue:#3b82f6;--violet:#8b5cf6;--amber:#f59e0b;--cyan:#06b6d4;--pink:#ec4899;
  --mono:'DM Mono',monospace;--sans:'Outfit',sans-serif;
  --radius:18px;--radius-sm:12px;--radius-xs:8px;
  --shadow:0 1px 6px rgba(0,0,0,0.04);--shadow-lg:0 4px 20px rgba(0,0,0,0.08);
}

/* ── SHELL ────────────────────────────────────────────────────── */
.shell{width:100%;background:var(--bg);display:grid;
  grid-template-areas:"header header""nav content";
  grid-template-columns:240px 1fr;grid-template-rows:auto 1fr;
  height:100vh;overflow:hidden;position:relative}
.header{grid-area:header;background:var(--card);padding:14px 24px;
  border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:800;color:var(--text)}
.header .ver{font-size:11px;color:var(--faint);margin-left:5px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:var(--green-glow);
  display:inline-block;margin-right:6px}
.live-txt{font-size:11px;color:var(--green);font-weight:600}
.content{grid-area:content;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#e2e8f0 transparent}
.tab-content{display:none;padding:28px 36px 40px}
.tab-content.active{display:block}

/* ── NAV ──────────────────────────────────────────────────────── */
.nav{grid-area:nav;background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:12px 0;gap:2px;overflow-y:auto}
.nav-brand{padding:8px 20px 16px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.nav-brand-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#10b981,#059669);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;
  font-family:var(--mono);letter-spacing:-1px;flex-shrink:0}
.nav-brand-name{font-size:14px;font-weight:800;color:var(--text)}
.nav button{padding:11px 20px;background:none;display:flex;flex-direction:row;
  align-items:center;gap:12px;transition:all 0.2s;
  border-left:3px solid transparent;border-radius:0;width:100%;text-align:left}
.nav button svg{width:20px;height:20px;flex-shrink:0;stroke:#94a3b8;transition:stroke 0.2s}
.nav button span{font-size:13px;font-weight:500;color:var(--muted);transition:color 0.2s}
.nav button:hover{background:var(--border)}
.nav button.active{background:var(--green-bg);border-left-color:var(--green)}
.nav button.active span{font-weight:700;color:var(--green)}
.nav button.active svg{stroke:var(--green)}
.nav-dot{display:none}
.saved-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;text-align:center}
.saved-empty-icon{font-size:48px;opacity:.35;line-height:1}
.saved-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:12px}
.saved-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.saved-card-meta{display:flex;align-items:center;gap:10px}
.saved-card-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.saved-card-title{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
.saved-card-sub{font-size:11px;color:var(--faint);margin-top:3px}
.saved-card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.saved-action-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s;white-space:nowrap}.saved-action-btn:active{opacity:.65}
.saved-preview{font-size:12px;color:var(--faint);line-height:1.55;max-height:52px;overflow:hidden;position:relative}.saved-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,var(--card))}
.finbot-save-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.finbot-save-btn-big{flex:1;min-width:140px;padding:13px;border-radius:14px;font-weight:700;font-size:14px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}.finbot-save-btn-big:active{opacity:.7}
#ie-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);background:#1e293b;color:#e2e8f0;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 24px rgba(0,0,0,.45);white-space:nowrap;pointer-events:none}

/* ── SHARED ───────────────────────────────────────────────────── */
.section-title{padding:18px 0 10px}
.section-title h2{font-size:22px;font-weight:800;color:var(--text)}
.section-title p{margin-top:3px;font-size:12px;color:var(--faint)}
.filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:0 0 10px}
.filter-btn{flex-shrink:0;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:500;
  background:var(--border);color:var(--muted);transition:all 0.2s}
.filter-btn.active{background:var(--dark);color:#fff;font-weight:700}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);
  transition:transform 0.2s;cursor:pointer}
.card:hover{transform:translateY(-2px)}
.mono{font-family:var(--mono)}
.up{color:var(--green)}.dn{color:var(--red)}
.chip{padding:3px 10px;border-radius:var(--radius-xs);font-weight:700;font-size:10px;display:inline-block}
.chip-green{background:var(--green-bg);color:var(--green)}
.chip-red{background:var(--red-bg);color:var(--red)}

/* ── NEWS CARD ENHANCEMENTS ───────────────────────────────────── */
.news-thumb{width:100%;height:160px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:10px;background:var(--border)}
.news-card{cursor:pointer;transition:all 0.2s}
.news-source{font-size:11px;color:var(--faint);font-weight:500;margin-top:4px}
.news-search{width:100%;padding:10px 16px;border-radius:var(--radius-sm);background:var(--border);
  font-size:13px;color:var(--text);margin-bottom:12px;transition:all 0.2s}
.news-search:focus{background:var(--card);box-shadow:0 0 0 2px var(--green)}
.news-search::placeholder{color:var(--faint)}
.news-skeleton{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel-line{height:14px;border-radius:6px;background:linear-gradient(90deg,var(--border) 25%,var(--border2) 50%,var(--border) 75%);
  background-size:400px 100%;animation:shimmer 1.4s infinite}
.skel-sm{height:10px;width:40%}.skel-lg{width:100%;margin-bottom:8px}.skel-md{width:70%}
.news-refresh-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--radius-xs);
  background:var(--border);color:var(--muted);font-size:11px;font-weight:600;transition:all 0.2s;cursor:pointer}
.news-refresh-btn:hover{background:var(--border2)}
.news-refresh-btn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── NEWS DETAIL OVERLAY ──────────────────────────────────────── */
.news-overlay{position:fixed;inset:0;z-index:1100;background:rgba(15,23,42,0.7);
  display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);
  animation:ndFadeIn 0.2s ease}
.news-overlay.hidden{display:none}
@keyframes ndFadeIn{from{opacity:0}to{opacity:1}}
.news-sheet{background:var(--card);width:100%;max-width:640px;border-radius:var(--radius) var(--radius) 0 0;
  max-height:90vh;overflow-y:auto;animation:ndSlide 0.3s ease}
@keyframes ndSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.news-sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0}
.news-sheet-inner{padding:16px 20px 36px}
.news-sheet-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.news-sheet-pub{font-size:12px;font-weight:700;color:var(--muted)}
.news-sheet-time{font-size:11px;color:var(--faint)}
.news-sheet-title{font-size:18px;font-weight:800;color:var(--text);line-height:1.4;margin-bottom:14px}
.news-sheet-img{width:100%;height:200px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:16px}
.news-sheet-tickers{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.news-ticker-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;
  background:var(--green-bg);color:var(--green);font-family:var(--mono)}
.news-sheet-btns{display:flex;gap:10px;margin-top:6px}
.news-btn-primary{flex:1;padding:14px;border-radius:var(--radius-sm);background:var(--green);color:#fff;
  font-size:13px;font-weight:700;text-align:center;cursor:pointer;text-decoration:none;display:block;transition:all 0.2s}
.news-btn-primary:hover{background:#059669}
.news-btn-secondary{flex:1;padding:14px;border-radius:var(--radius-sm);background:var(--border);color:var(--text2);
  font-size:13px;font-weight:700;text-align:center;cursor:pointer;transition:all 0.2s}
.news-btn-secondary:hover{background:var(--border2)}

/* ── LIVE BANNER ──────────────────────────────────────────────── */
.live-banner{background:linear-gradient(135deg,#10b981,#059669);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;color:#fff}
.live-banner .badge{background:#fff;color:var(--green);font-weight:800;font-size:10px;
  padding:3px 10px;border-radius:var(--radius-xs);letter-spacing:0.05em;margin-right:10px}

/* ── NEWS ─────────────────────────────────────────────────────── */
.news-card{margin-bottom:10px}
.news-card .cat{font-weight:700;font-size:10px;padding:3px 10px;border-radius:var(--radius-xs)}
.news-card .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.news-card h3{font-weight:600;font-size:14px;color:var(--text);line-height:1.4}
.news-card .cta{margin-top:6px;font-size:12px;color:var(--faint)}

/* ── MARKETS ──────────────────────────────────────────────────── */
.featured-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.featured-card{background:linear-gradient(135deg,#0c1320,#1e293b);border:1px solid #ffffff0a;border-radius:18px;padding:14px 14px 10px;cursor:pointer;transition:transform .18s,border-color .18s;position:relative;overflow:hidden}
.featured-card:hover{transform:translateY(-2px);border-color:#ffffff18}
.featured-card:active{transform:scale(0.98)}
.featured-chart{height:62px;margin-top:10px;border-radius:8px;overflow:hidden}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.market-tile{background:var(--card);border-radius:var(--radius);padding:14px 14px 10px;
  box-shadow:var(--shadow);cursor:pointer;transition:all 0.2s;border:2px solid transparent}
.market-tile:hover{border-color:var(--green);transform:translateY(-2px)}
.market-tile .ticker{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:0.08em}
.market-tile .name{font-weight:700;font-size:13px;color:var(--text);margin:2px 0 1px}
.market-tile .price{font-family:var(--mono);font-weight:500;font-size:14px;color:var(--text)}
.market-tile .bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.mini-chart{width:64px;height:32px}

/* ── STOCK DETAIL ─────────────────────────────────────────────── */
.stock-detail{position:fixed;inset:0;z-index:1000;background:#0c1320;display:flex;
  flex-direction:column;overflow:auto}
.stock-detail.hidden{display:none}
.sd-header{padding:16px 20px 12px;border-bottom:1px solid #ffffff0a;display:flex;
  justify-content:space-between;align-items:center;background:#0f172a}
.sd-back{background:#1e293b;border-radius:10px;width:36px;height:36px;color:#94a3b8;
  font-size:18px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.sd-subinfo{padding:8px 20px 4px;display:flex;gap:16px;background:#0f172a}
.sd-chart{height:300px;padding:4px 4px 0;background:#0f172a;flex-shrink:0}
.sd-timeframes{display:flex;justify-content:center;gap:8px;padding:12px 20px 12px;
  background:#0f172a;border-bottom:1px solid #ffffff0a}
.tf-btn{padding:7px 18px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:600;
  background:#1e293b;color:#64748b;transition:all 0.2s;border:none;cursor:pointer}
.tf-btn.active-up{background:var(--green);color:#fff}
.tf-btn.active-dn{background:var(--red);color:#fff}
.sd-stats{padding:6px 20px 4px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-box{background:#1e293b;border:1px solid #ffffff0a;border-radius:var(--radius-sm);padding:12px 8px;text-align:center}
.stat-box .label{font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.stat-box .val{margin-top:5px;font-family:var(--mono);font-size:13px;font-weight:600;color:#e2e8f0}

/* ── FINBOT ───────────────────────────────────────────────────── */
.finbot-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.finbot-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#10b981,#059669);
  display:flex;align-items:center;justify-content:center;font-size:22px}
.disclaimer-box{background:var(--dark);border:1px solid var(--dark2);border-radius:14px;padding:14px;margin-bottom:16px}
.mode-card{background:var(--card);border-radius:20px;padding:16px;transition:all 0.2s;
  border:2px solid var(--border);margin-bottom:10px;cursor:pointer}
.mode-card:hover{transform:translateY(-2px)}
.mode-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0}
.mode-sub{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}

/* Form elements */
.form-label{display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px}
.form-hint{margin-top:5px;font-size:11px;color:var(--faint)}
.form-input{width:100%;padding:13px 16px;border-radius:14px;border:2px solid var(--border2);
  font-size:14px;transition:border 0.2s;color:var(--text);background:#fff}
.form-input:focus{border-color:var(--green)}
.form-input.mono{font-family:var(--mono);font-size:16px;letter-spacing:0.05em}
.form-textarea{width:100%;padding:13px 16px;border-radius:14px;border:2px solid var(--border2);
  font-size:13px;transition:border 0.2s;color:var(--text);background:#fff;resize:vertical;line-height:1.6}
.form-textarea:focus{border-color:var(--green)}
.pills{display:grid;gap:8px}
.pills.cols-3{grid-template-columns:1fr 1fr 1fr}
.pills.cols-2{grid-template-columns:1fr 1fr}
.pill{padding:10px 6px;border-radius:12px;border:2px solid var(--border2);background:#fff;
  font-size:12px;font-weight:500;color:var(--muted);transition:all 0.2s;text-align:center}
.pill.selected{font-weight:700}
.pill .emoji{font-size:16px;margin-bottom:3px}
.pill .sub{font-size:10px;font-weight:400;color:var(--faint);margin-top:2px}
.run-btn{width:100%;padding:17px;border-radius:16px;color:#fff;font-weight:800;font-size:15px;
  transition:all 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.run-btn:hover{transform:translateY(-1px)}
.run-btn:disabled{background:#e2e8f0!important;color:var(--faint);cursor:not-allowed;
  box-shadow:none;transform:none}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px}
@keyframes fp{0%,100%{transform:scale(1)}50%{transform:scale(0.92)}}
@keyframes bd{0%,100%{opacity:0.3}50%{opacity:1}}
.loading-icon{width:72px;height:72px;border-radius:22px;display:flex;align-items:center;
  justify-content:center;font-size:32px;animation:fp 2s ease-in-out infinite}
.loading-dots{display:flex;gap:8px;margin-top:24px}
.loading-dots span{width:9px;height:9px;border-radius:50%}

/* Result */
.result-header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 12px}
.result-content{background:var(--card);border-radius:20px;padding:18px 16px;box-shadow:var(--shadow)}
.result-content h1{margin:20px 0 10px;font-size:20px;font-weight:800;color:var(--text)}
.result-content h2{margin:18px 0 8px;font-size:16px;font-weight:700;color:var(--text)}
.result-content h3{margin:14px 0 6px;font-size:14px;font-weight:700;color:var(--text2)}
.result-content p{margin:3px 0;line-height:1.75;font-size:13.5px;color:var(--text)}
.result-content .bullet{display:flex;gap:8px;margin:3px 0;padding-left:4px}
.result-content .bullet::before{content:'•';color:var(--green);font-weight:700}
.result-content .md-table{display:grid;gap:1px;margin:8px 0}
.result-content .md-table .th{padding:6px 8px;font-size:11px;font-family:var(--mono);
  font-weight:700;color:var(--text);background:var(--border);border-radius:4px 4px 0 0}
.result-content .md-table .td{padding:6px 8px;font-size:11px;font-family:var(--mono);
  color:var(--muted);background:#fff;border-bottom:1px solid var(--border)}
.result-content .disclaimer{margin-top:12px;font-size:11px;color:var(--faint);font-style:italic;line-height:1.6}
.back-btn-row{display:flex;align-items:center;gap:10px;padding:18px 0 16px}
.back-btn{background:var(--border);border-radius:10px;width:36px;height:36px;color:var(--muted);
  font-size:18px;display:flex;align-items:center;justify-content:center}
.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:16px;padding:16px;margin-bottom:12px}

/* ── PORTFOLIO ────────────────────────────────────────────────── */
.port-hero{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:22px;padding:18px;margin-bottom:14px}
.port-chart{height:70px}
.alloc-card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.alloc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.alloc-dot{width:10px;height:10px;border-radius:3px;margin-right:7px;display:inline-block}
.holding-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px}
.holding-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.holding-stat{text-align:center}
.holding-stat .hl{font-size:10px;color:var(--faint)}
.holding-stat .hv{margin-top:2px;font-family:var(--mono);font-size:12px;font-weight:500;color:#374151}
.port-perf-card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.perf-tabs{display:flex;gap:3px;background:var(--border);border-radius:10px;padding:3px}
.perf-tab{padding:4px 11px;border-radius:7px;font-size:11px;font-weight:700;color:var(--faint);cursor:pointer;transition:all .15s;background:none;border:none}
.perf-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.pnl-bars-card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.pnl-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}.pnl-bar-row:last-child{margin-bottom:0}
.pnl-bar-label{font-size:11px;font-weight:700;color:var(--muted);font-family:var(--mono);width:42px;flex-shrink:0}
.pnl-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pnl-bar-fill{height:100%;border-radius:3px;width:0;transition:width .8s cubic-bezier(.25,.46,.45,.94)}
.pnl-bar-val{font-size:11px;font-weight:700;font-family:var(--mono);width:54px;text-align:right;flex-shrink:0}

/* ── AUTH POPUP ───────────────────────────────────────────────── */
.auth-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.45);
  backdrop-filter:blur(6px);display:flex;justify-content:center;align-items:center;padding:24px}
.auth-overlay.hidden{display:none}
.auth-popup{position:relative;background:var(--bg);border-radius:24px;padding:28px 24px 24px;
  width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,0.28);
  animation:popIn 0.18s ease;overflow-y:auto;max-height:calc(100vh - 48px)}
@keyframes popIn{from{transform:scale(0.96);opacity:0}to{transform:scale(1);opacity:1}}
.auth-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;
  background:var(--border);color:var(--muted);font-size:15px;display:flex;
  align-items:center;justify-content:center;transition:background 0.15s;z-index:1}
.auth-close:hover{background:var(--border2)}
.auth-logo{text-align:center;margin-bottom:26px}
.auth-logo-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#10b981,#059669);
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;
  margin:0 auto 12px;letter-spacing:-1px;font-family:var(--mono)}
.auth-logo h2{font-size:24px;font-weight:800;color:var(--text)}
.auth-logo p{font-size:12px;color:var(--faint);margin-top:3px}
.auth-card{background:var(--card);border-radius:22px;padding:20px;box-shadow:var(--shadow-lg)}
.auth-tabs{display:flex;background:var(--border);border-radius:10px;padding:3px;margin-bottom:18px;gap:3px}
.auth-tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);
  transition:all 0.2s;text-align:center;cursor:pointer;background:none;border:none}
.auth-tab.active{background:#fff;color:var(--text);box-shadow:var(--shadow)}
.auth-field{margin-bottom:12px}
.auth-error{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
  padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.auth-error.show{display:block}
.auth-btn{width:100%;padding:15px;border-radius:14px;background:var(--green);color:#fff;
  font-weight:800;font-size:14px;transition:all 0.2s;margin-top:4px}
.auth-btn:hover{background:#059669}
.auth-btn:disabled{background:#e2e8f0;color:var(--faint);cursor:not-allowed}
.auth-divider{text-align:center;font-size:11px;color:var(--faint);margin:14px 0 0}

/* ── SETTINGS ─────────────────────────────────────────────────── */
.avatar{width:72px;height:72px;border-radius:22px;display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-1px}
.profile-card{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:22px;padding:18px;
  margin-bottom:14px;display:flex;gap:14px;align-items:center}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:18px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-email{font-size:12px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-badge{margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:#10b98120;
  border:1px solid #10b98140;border-radius:8px;padding:3px 10px}
.profile-badge span{font-size:10px;font-weight:700;color:#10b981}
.edit-profile-btn{background:#1e293b;border:1.5px solid #334155;border-radius:12px;
  padding:8px 14px;font-size:12px;font-weight:700;color:#94a3b8;flex-shrink:0;transition:all 0.2s}
.edit-profile-btn:hover{border-color:#10b981;color:#10b981}
.settings-section{margin-bottom:18px}
.settings-section-label{font-size:10px;font-weight:700;color:var(--faint);letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:8px;padding-left:4px}
.settings-group{background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
  border-bottom:1px solid var(--border);gap:12px}
.settings-row:last-child{border-bottom:none}
.settings-row-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.settings-row-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0}
.settings-row-title{font-size:13.5px;font-weight:600;color:var(--text)}
.settings-row-sub{font-size:11px;color:var(--faint);margin-top:1px}
.toggle{position:relative;width:44px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:#e2e8f0;border-radius:13px;transition:background 0.25s;cursor:pointer}
.toggle input:checked + .toggle-track{background:var(--green)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.15);transition:transform 0.25s;pointer-events:none}
.toggle input:checked ~ .toggle-thumb{transform:translateX(18px)}
.settings-select{background:var(--border);border:none;border-radius:8px;padding:5px 10px;
  font-size:12px;font-weight:600;color:var(--text2);font-family:var(--sans);cursor:pointer}
.settings-select:focus{outline:2px solid var(--green)}
.settings-value{font-size:12px;font-weight:700;color:var(--green);background:var(--green-bg);
  padding:4px 10px;border-radius:8px}
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.5);
  display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;padding:20px 20px 36px;
  width:100%;max-width:520px;animation:slideUp 0.3s ease;max-height:90vh;overflow-y:auto}
.quick-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.quick-chip{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:none;line-height:1;transition:opacity .15s;white-space:nowrap}.quick-chip:active{opacity:.65}
.qc-commodity{background:#fef3c7;color:#92400e}.qc-crypto{background:#f3e8ff;color:#6d28d9}
.qc-etf{background:#dbeafe;color:#1e40af}.qc-stock{background:#dcfce7;color:#166534}
.import-port-btn{font-size:11px;font-weight:700;color:var(--green);background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:2px 0;flex-shrink:0}
.user-chip{position:relative;cursor:pointer;border-radius:10px;padding:4px 6px;transition:background .15s}.user-chip:hover{background:var(--border)}
.user-dropdown{position:absolute;top:calc(100% + 10px);right:0;min-width:220px;background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.3);z-index:2000;overflow:hidden;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .2s ease,transform .2s ease}
.user-chip:hover .user-dropdown,.user-chip:focus-within .user-dropdown{opacity:1;transform:translateY(0);pointer-events:auto}
.user-dd-header{padding:14px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0f172a,#1e293b)}
.user-dd-name{font-size:13px;font-weight:800;color:#fff}.user-dd-email{font-size:11px;color:#64748b;margin-top:2px}
.user-dd-item{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .15s;white-space:nowrap}.user-dd-item:hover{background:var(--border)}
.user-dd-item svg{flex-shrink:0;opacity:.7}.user-dd-divider{height:1px;background:var(--border);margin:3px 0}
.user-dd-item.signout{color:#f87171}.user-dd-item.signout:hover{background:#7f1d1d22}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-save-btn{width:100%;padding:15px;border-radius:14px;background:var(--green);color:#fff;
  font-weight:800;font-size:14px;margin-top:6px;transition:all 0.2s}
.modal-save-btn:hover{background:#059669}
.modal-cancel{width:100%;padding:11px;border-radius:14px;background:var(--border);color:var(--muted);
  font-weight:700;font-size:13px;margin-top:8px}
.danger-btn{width:100%;padding:13px;border-radius:14px;background:#fef2f2;color:var(--red);
  font-weight:700;font-size:13px;border:1.5px solid #fecaca;transition:all 0.2s}
.danger-btn:hover{background:#fee2e2}
.about-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--border)}
.about-row:last-child{border-bottom:none}
.about-label{font-size:12px;color:var(--faint)}
.about-val{font-size:12px;font-weight:600;color:var(--text2);font-family:var(--mono)}

/* ── LEARNING HUB ────────────────────────────────────────────── */
.learn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:12px}
.learn-topic-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
  cursor:pointer;transition:all 0.2s;border:2px solid transparent;position:relative;overflow:hidden}
.learn-topic-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.learn-topic-card.completed-card{border-color:var(--green)}
.learn-topic-icon{width:44px;height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;
  justify-content:center;font-size:22px;margin-bottom:12px}
.learn-topic-card h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.learn-topic-card p{font-size:12px;color:var(--faint);line-height:1.5}
.learn-topic-meta{display:flex;align-items:center;gap:10px;margin-top:12px}
.learn-difficulty{padding:3px 10px;border-radius:var(--radius-xs);font-weight:700;font-size:10px;text-transform:uppercase}
.diff-beginner{background:#10b98118;color:var(--green)}
.diff-intermediate{background:#3b82f618;color:var(--blue)}
.diff-advanced{background:#8b5cf618;color:var(--violet)}
.learn-lesson-count{font-size:11px;color:var(--faint);font-weight:500}
.learn-progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.learn-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.4s ease}

.learn-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0}
.learn-stat-card{background:var(--card);border-radius:var(--radius-sm);padding:16px;box-shadow:var(--shadow);text-align:center}
.learn-stat-num{font-size:28px;font-weight:800;font-family:var(--mono);color:var(--text)}
.learn-stat-label{font-size:11px;color:var(--faint);font-weight:500;margin-top:2px}

.learn-detail{animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.learn-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-xs);
  background:var(--border);color:var(--muted);font-size:12px;font-weight:600;margin-bottom:16px;transition:all 0.2s}
.learn-back:hover{background:var(--border2);color:var(--text)}
.learn-section{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.learn-section h3{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px}
.learn-section p,.learn-section li{font-size:13px;color:var(--text2);line-height:1.75}
.learn-section ul{padding-left:20px;margin-top:6px}
.learn-section ul li{margin-bottom:4px}
.learn-section .term{font-weight:700;color:var(--green)}
.learn-section .highlight{background:var(--green-bg);padding:12px 16px;border-radius:var(--radius-xs);
  border-left:3px solid var(--green);margin:12px 0;font-size:13px;color:var(--text2);line-height:1.6}
.learn-section .warn{background:#f59e0b18;padding:12px 16px;border-radius:var(--radius-xs);
  border-left:3px solid var(--amber);margin:12px 0;font-size:13px;color:var(--text2);line-height:1.6}
.learn-nav-btns{display:flex;gap:10px;margin-top:8px}
.learn-nav-btn{padding:10px 24px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;transition:all 0.2s}
.learn-nav-btn.primary{background:var(--green);color:#fff}
.learn-nav-btn.primary:hover{background:#059669}
.learn-nav-btn.secondary{background:var(--border);color:var(--muted)}
.learn-nav-btn.secondary:hover{background:var(--border2)}

.quiz-container{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-top:16px}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.quiz-progress{font-size:12px;font-weight:600;color:var(--faint);font-family:var(--mono)}
.quiz-question{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{padding:14px 18px;border-radius:var(--radius-sm);background:var(--border);font-size:13px;
  font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.2s;border:2px solid transparent;text-align:left}
.quiz-option:hover{background:var(--border2);border-color:var(--border2)}
.quiz-option.selected{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700}
.quiz-option.correct{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700}
.quiz-option.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700}
.quiz-option.dimmed{opacity:0.5;pointer-events:none}
.quiz-feedback{margin-top:14px;padding:14px 18px;border-radius:var(--radius-sm);font-size:13px;line-height:1.6}
.quiz-feedback.correct-fb{background:var(--green-bg);color:#065f46;border:1px solid #10b98140}
.quiz-feedback.wrong-fb{background:var(--red-bg);color:#991b1b;border:1px solid #ef444440}
.quiz-score{text-align:center;padding:30px;animation:fadeIn 0.3s ease}
.quiz-score h3{font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px}
.quiz-score .score-num{font-size:48px;font-weight:800;font-family:var(--mono);margin:12px 0}
.quiz-score p{font-size:13px;color:var(--faint);margin-bottom:20px}

/* ── RESPONSIVE ───────────────────────────────────────────────── */
@media(max-width:768px){
  body{overflow:auto}
  .shell{grid-template-areas:"header""content""nav";
    grid-template-columns:1fr;grid-template-rows:auto 1fr auto;height:100svh}
  .nav{flex-direction:row;border-right:none;border-top:1px solid var(--border);padding:4px 0 8px}
  .nav-brand{display:none}
  .nav button{flex:1;flex-direction:column;align-items:center;gap:3px;
    padding:10px 4px 6px;border-left:none;border-top:3px solid transparent}
  .nav button.active{border-left-color:transparent;border-top-color:var(--green)}
  .nav button svg{width:22px;height:22px}
  .nav button span{font-size:10px}
  .tab-content{padding:16px 16px 24px}
}
</style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <div class="header">
    <div><h1>FinVue<span class="ver">v8</span></h1></div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="display:flex;align-items:center"><span class="live-dot"></span><span class="live-txt">Live</span></div>
      <div id="header-auth-btns" style="display:flex;align-items:center;gap:8px">
        <button onclick="document.getElementById('auth-overlay').classList.remove('hidden');showAuthTab('login')"
          style="padding:7px 16px;border-radius:10px;font-size:12px;font-weight:700;color:var(--text2);background:var(--border);transition:background 0.2s"
          onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='var(--border)'">Log in</button>
        <button onclick="document.getElementById('auth-overlay').classList.remove('hidden');showAuthTab('register')"
          style="padding:7px 16px;border-radius:10px;font-size:12px;font-weight:700;color:#fff;background:var(--green);transition:background 0.2s"
          onmouseover="this.style.background='#059669'" onmouseout="this.style.background='var(--green)'">Sign up</button>
      </div>
      <div id="header-user" class="user-chip" style="display:none;align-items:center;gap:8px" tabindex="0">
        <div id="header-avatar" style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;font-family:var(--mono)"></div>
        <span id="header-username-text" style="font-size:13px;font-weight:700;color:var(--text2)"></span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="color:var(--faint);flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg>
        <div class="user-dropdown">
          <div class="user-dd-header">
            <div class="user-dd-name" id="dd-name"></div>
            <div class="user-dd-email" id="dd-email"></div>
          </div>
          <button class="user-dd-item" onclick="switchTab('portfolio');event.stopPropagation()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4h-4z"/></svg>
            My Portfolio
          </button>
          <button class="user-dd-item" onclick="switchTab('saved');event.stopPropagation()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
            Saved Reports
          </button>
          <button class="user-dd-item" onclick="switchTab('settings');event.stopPropagation()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            Settings
          </button>
          <div class="user-dd-divider"></div>
          <button class="user-dd-item signout" onclick="doLogout();event.stopPropagation()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div id="tab-news" class="tab-content active"></div>
    <div id="tab-markets" class="tab-content"></div>
    <div id="tab-finbot" class="tab-content"></div>
    <div id="tab-portfolio" class="tab-content"></div>

function genPrices(base, n, vol = 0.015, trend = 0.0002) {
  const out = []; let p = base * (0.82 + Math.random() * 0.12);
  for (let i = 0; i < n; i++) {
    p = Math.max(p + p * (trend + (Math.random() - 0.48) * vol), base * 0.5);
    out.push(parseFloat(p.toFixed(2)));
  }
  out[out.length - 1] = base;
  return out;
}

function dayLabels(n) {
  const o = [], now = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now); d.setMinutes(now.getMinutes() - i * 5);
    o.push(d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0'));
  }
  return o;
}
function weekLabels(n) { const d = ['Mon','Tue','Wed','Thu','Fri']; return Array.from({length:n}, (_,i) => d[i%5]); }
function monthLabels(n) {
  const o = [], now = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    o.push((d.getMonth()+1) + '/' + d.getDate());
  }
  return o;
}

};
function curCfg() { return CURRENCY_CONFIG[loadSettings().currency] || CURRENCY_CONFIG.USD; }

function fmtMoney(v) {
  if (loadSettings().hideBalances) return '••••••';
  const cfg = curCfg();
  return cfg.symbol + (v * cfg.rate).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// Per-unit price with currency conversion (for avg cost / current price in portfolio)
function fmtUnitPrice(v) {
  if (loadSettings().hideBalances) return '••••';
  const cfg = curCfg();
  const c = v * cfg.rate;
  if (c >= 10000) return cfg.symbol + c.toLocaleString('en-US', { maximumFractionDigits: 0 });
  return cfg.symbol + c.toFixed(2);
}

function escHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function parseMd(text) {
  return text.split('\n').map(line => {
    if (line.startsWith('# ')) return `<h1>${inlineMd(line.slice(2))}</h1>`;
    if (line.startsWith('## ')) return `<h2>${inlineMd(line.slice(3))}</h2>`;
    if (line.startsWith('### ')) return `<h3>${inlineMd(line.slice(4))}</h3>`;
    if (line.startsWith('- ') || line.startsWith('* ')) return `<div class="bullet">${inlineMd(line.slice(2))}</div>`;
    if (/^\d+\. /.test(line)) return `<div class="bullet">${inlineMd(line.replace(/^\d+\. /, ''))}</div>`;
    if (line.startsWith('|')) {
      const cells = line.split('|').filter(c => c.trim());
      if (!cells.length || cells.every(c => /^[-: ]+$/.test(c))) return '';
      return `<div class="md-table" style="grid-template-columns:repeat(${cells.length},1fr)">${cells.map(c => `<div class="td">${c.trim()}</div>`).join('')}</div>`;
    }
    if (line.toLowerCase().includes('legal disclaimer') || line.toLowerCase().includes('informational and educational'))
      return `<p class="disclaimer">${inlineMd(line.replace(/^\*|\*$/g, ''))}</p>`;
    if (line.trim() === '' || line === '---') return '<div style="height:6px"></div>';
    return `<p>${inlineMd(line)}</p>`;
  }).join('');
}

function inlineMd(t) {
  return escHtml(t).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}

function createMiniChart(container, data, color, height = 32) {
  if (!container || !data.length) return null;
  container.innerHTML = '';
  const chart = LightweightCharts.createChart(container, {
    width: container.clientWidth || 64, height,
    layout: { background: { type: 'solid', color: 'transparent' }, textColor: 'transparent' },
    grid: { vertLines: { visible: false }, horzLines: { visible: false } },
    crosshair: { mode: 0 },
    rightPriceScale: { visible: false },
    timeScale: { visible: false },
    handleScroll: false, handleScale: false,
  });
  const series = chart.addAreaSeries({
    lineColor: color, lineWidth: 2,
    topColor: color + '40', bottomColor: color + '05',
    crosshairMarkerVisible: false, priceLineVisible: false,
    lastValueVisible: false,
  });
  series.setData(data.map((d, i) => ({ time: d.time ?? (i + 1), value: d.value })));
  chart.timeScale().fitContent();
  return chart;
}

function createFullChart(container, data, color, height = 300) {
  if (!container || !data.length) return null;
  container.innerHTML = '';
  const chart = LightweightCharts.createChart(container, {
    width: container.clientWidth, height,
    layout: { background: { type: 'solid', color: '#0c1320' }, textColor: '#64748b', fontFamily: 'DM Mono, monospace' },
    grid: { vertLines: { color: '#ffffff08' }, horzLines: { color: '#ffffff08' } },
    crosshair: {
      mode: 1,
      vertLine: { color: color + '80', width: 1, style: 0, labelBackgroundColor: color },
      horzLine: { color: color + '80', width: 1, style: 0, labelBackgroundColor: color },
    },
    rightPriceScale: { borderVisible: false, textColor: '#475569', scaleMargins: { top: 0.12, bottom: 0.08 } },
    timeScale: {
      borderVisible: false, timeVisible: true, secondsVisible: false,
      tickMarkFormatter: (t) => {
        const d = new Date(t * 1000);
        const now = new Date();
        const diffDays = Math.round((now - d) / 86400000);
        if (diffDays < 1) return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        if (diffDays < 60) return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
        return d.toLocaleDateString('en-GB', { month:'short', year:'2-digit' });
      },
    },
    handleScroll: { mouseWheel: false, pressedMouseMove: true },
    handleScale:  { mouseWheel: false, pinch: true },
  });
  const series = chart.addAreaSeries({
    lineColor: color, lineWidth: 2,
    topColor: color + '28', bottomColor: color + '00',
    priceLineVisible: true, lastValueVisible: true,
    priceLineColor: color, priceLineWidth: 1, priceLineStyle: 2,
    crosshairMarkerRadius: 5, crosshairMarkerBackgroundColor: color,
    crosshairMarkerBorderColor: '#0c1320',
  });
  const baseline = data[0].value;
  chart.addLineSeries({
    color: '#334155', lineWidth: 1, lineStyle: 3,
    priceLineVisible: false, lastValueVisible: false,
    crosshairMarkerVisible: false,
  }).setData(data.map((d, i) => ({ time: d.time ?? (i + 1), value: baseline })));
  series.setData(data.map((d, i) => ({ time: d.time ?? (i + 1), value: d.value })));
  chart.timeScale().fitContent();
  return chart;
}

// Client-side RSS helpers (used when server-side PHP cannot reach the internet)
function _newsCateg(title) {
  const t = title.toLowerCase();
  if (/bitcoin|ethereum|crypto|blockchain|defi|solana|nft|dogecoin|ripple|altcoin/.test(t)) return 'Crypto';
  if (/\bfed\b|federal reserve|inflation|cpi|ppi|gdp|interest rate|recession|unemployment|tariff|trade war|central bank/.test(t)) return 'Economy';
  if (/apple|microsoft|google|alphabet|amazon|meta|nvidia|tesla|openai|\bai\b|artificial intelligence|chip|semiconductor|software|cloud|cyber/.test(t)) return 'Tech';
  return 'Markets';
}
function _newsHot(title) {
  return /surge|soar|crash|record|rally|plunge|breaking|alert|spike|all.time.high|ath|collapse|explode/i.test(title);
}

async function fetchNewsClientSide() {
  const RSS2JSON = 'https://api.rss2json.com/v1/api.json?count=20&rss_url=';
  const feeds = [
    { url: 'https://www.cnbc.com/id/100003114/device/rss/rss.html',            pub: 'CNBC' },
    { url: 'https://feeds.marketwatch.com/marketwatch/topstories/',             pub: 'MarketWatch' },
    { url: 'https://rss.nytimes.com/services/xml/rss/nyt/Business.xml',         pub: 'New York Times' },
    { url: 'https://feeds.a.dj.com/rss/RSSMarketsMain.xml',                    pub: 'Wall Street Journal' },
    { url: 'https://www.cnbc.com/id/10000664/device/rss/rss.html',             pub: 'CNBC' },
  ];

  const articles = [], seen = new Set();
  await Promise.allSettled(feeds.map(async ({ url, pub }) => {
    try {
      const r = await fetch(RSS2JSON + encodeURIComponent(url));
      const d = await r.json();
      if (d.status !== 'ok' || !Array.isArray(d.items)) return;
      for (const item of d.items) {
        if (!item.title) continue;
        const key = item.title.trim().toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);
        const pubTime = item.pubDate ? Math.floor(new Date(item.pubDate).getTime() / 1000) : 0;
        const age = Math.max(0, Date.now() / 1000 - pubTime);
        const timeStr = age < 3600 ? Math.max(1, Math.round(age / 60)) + 'm ago'
                      : age < 86400 ? Math.round(age / 3600) + 'h ago'
                      : Math.round(age / 86400) + 'd ago';
        const desc = (item.description || '').replace(/<[^>]+>/g, '').trim().slice(0, 400);
        articles.push({
          uuid: btoa(encodeURIComponent(item.title + item.link)).slice(0, 16),
          title: item.title,
          publisher: pub,
          link: item.link || '',
          description: desc,
          time: timeStr,
          pubTime,
          tickers: [],
          thumbnail: item.thumbnail || item.enclosure?.link || null,
          cat: _newsCateg(item.title),
          hot: _newsHot(item.title),
        });
      }
    } catch(e) {}
  }));
  articles.sort((a, b) => b.pubTime - a.pubTime);
  return articles.slice(0, 50);
}

async function fetchLiveNews(force = false) {
  const now = Date.now();
  if (!force && liveNews.length && (now - newsLastFetched) < 5 * 60 * 1000) return;

  // 1. Try server-side PHP (works when server has outbound internet access)
  try {
    const r = await fetch('prices.php?action=news&count=40');
    const d = await r.json();
    if (d.success && d.articles && d.articles.length) {
      liveNews = d.articles;
      newsLastFetched = now;
      newsFetchedAt = new Date();
      renderNewsContent();
      return;
    }
  } catch(e) {}

  // 2. Fall back to client-side RSS fetching (works regardless of server network)
  try {
    const articles = await fetchNewsClientSide();
    if (articles.length) {
      liveNews = articles;
      newsLastFetched = now;
      newsFetchedAt = new Date();
    }
  } catch(e) {}

  renderNewsContent();
}

const articleCache = {};  // url → paragraphs[]

function openNewsArticle(idx, fromLive) {
  const source = fromLive ? liveNews : NEWS_FALLBACK;
  const n = source[idx];
  if (!n) return;

  const overlay = document.getElementById('news-overlay');
  const inner   = document.getElementById('news-sheet-inner');
  const cleanTickers = (n.tickers || []).filter(t => !t.startsWith('^'));
  const articleLink = n.link || `https://www.google.com/search?q=${encodeURIComponent(n.title)}&tbm=nws`;

  function renderSheet(bodyHtml) {
    inner.innerHTML = `
      <div class="news-sheet-meta">
        <span class="news-sheet-pub">${escHtml(n.publisher || '')}</span>
        <span class="news-sheet-time">${escHtml(n.time)}</span>
      </div>
      ${n.thumbnail ? `<img class="news-sheet-img" src="${escHtml(n.thumbnail)}" alt="" onerror="this.style.display='none'">` : ''}
      <div class="news-sheet-title">${escHtml(n.title)}</div>
      ${cleanTickers.length ? `<div class="news-sheet-tickers">${cleanTickers.map(t=>`<span class="news-ticker-chip">${escHtml(t)}</span>`).join('')}</div>` : ''}
      <div id="news-body-box" style="margin:14px 0 16px">${bodyHtml}</div>
      <a class="news-btn-primary" href="${escHtml(articleLink)}" target="_blank" rel="noopener" style="display:block;text-align:center;text-decoration:none">
        Read Full Article on ${escHtml(n.publisher || 'Publisher')} ↗
      </a>
    `;
  }

  overlay.classList.remove('hidden');

  // 1. Use RSS description if available (instant, no fetch needed)
  if (n.description && n.description.length > 60) {
    renderSheet(`<p style="font-size:13px;color:var(--text2);line-height:1.75">${escHtml(n.description)}</p>`);
    return;
  }

  // 2. Use cached full-article scrape
  if (n.link && articleCache[n.link]) {
    renderSheet(buildArticleHtml(articleCache[n.link]));
    return;
  }

  // 3. No description and no cache — show spinner and scrape
  renderSheet(`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;color:var(--faint);font-size:13px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite;flex-shrink:0"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
    Loading article…
  </div>`);

  if (!n.link) {
    document.getElementById('news-body-box').innerHTML = `<p style="font-size:13px;color:var(--faint)">Click the link below to read this article.</p>`;
    return;
  }

  fetch(`prices.php?action=article&url=${encodeURIComponent(n.link)}`)
    .then(r => r.json())
    .then(d => {
      const box = document.getElementById('news-body-box');
      if (!box) return;
      if (d.success && d.paragraphs && d.paragraphs.length) {
        articleCache[n.link] = d.paragraphs;
        box.innerHTML = buildArticleHtml(d.paragraphs);
      } else {
        box.innerHTML = `<p style="font-size:13px;color:var(--faint)">Preview unavailable — click the link below to read on the publisher's site.</p>`;
      }
    })
    .catch(() => {
      const box = document.getElementById('news-body-box');
      if (box) box.innerHTML = `<p style="font-size:13px;color:var(--faint)">Preview unavailable — click the link below to read on the publisher's site.</p>`;
    });
}

function buildArticleHtml(paragraphs) {
  return paragraphs.map(p => `<p style="font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:12px">${escHtml(p)}</p>`).join('');
}

function closeNewsOverlay() {

function analyseNewsWithFinBot(headline) {
  closeNewsOverlay();

    }
  }, 300);
}

// ── Live data helpers ─────────────────────────────────────────────────────────
async function fetchLivePrices() {
  const tickers = MARKETS.map(m => m.ticker).join(',');
  try {
    const r = await fetch('prices.php?action=quotes&tickers=' + tickers);
    const d = await r.json();
    if (!d.success) return;
    let updated = false;
    MARKETS.forEach(m => {
      const q = d.quotes[m.ticker];
      if (q && q.price) {
        m.val = q.price; m.chg = q.chg ?? m.chg;
        if (q.hi52) m.hi52 = String(q.hi52);
        if (q.lo52) m.lo52 = String(q.lo52);
        updated = true;
      }
    });
    if (updated) {
      const tab = document.getElementById('tab-markets');
      if (tab && tab.classList.contains('active')) renderMarkets();
    }
  } catch(e) { /* keep generated data on error */ }
}

async function fetchLiveChart(ticker, tf, callback) {
  try {
    const r = await fetch(`prices.php?action=chart&ticker=${encodeURIComponent(ticker)}&tf=${tf}`);
    const d = await r.json();
    if (d.success && d.points && d.points.length > 1) callback(d.points);
  } catch(e) { /* silent fallback */ }
}

function openStockDetail(idx) {
  const stock = MARKETS[idx];
  const up    = stock.chg >= 0;
  const color = up ? '#10b981' : '#ef4444';
  const overlay = document.getElementById('stock-detail');

  // Compute simulated timeframe returns from generated chart data
  function tfReturn(tf) {
    const pts = stock.charts[tf];
    if (!pts || pts.length < 2) return null;
    const ret = ((pts[pts.length - 1].value - pts[0].value) / pts[0].value * 100);
    return ret.toFixed(2);
  }
  const returns = TIMEFRAMES.map(tf => ({ tf, r: tfReturn(tf) }));

  // 52-week range position (0–100%)
  const hi52n = parseFloat(stock.hi52);
  const lo52n = parseFloat(stock.lo52);
  const rangePct = hi52n > lo52n ? Math.round((stock.val - lo52n) / (hi52n - lo52n) * 100) : 50;

  // Sector-specific label
  const assetLabel = { Crypto:'Cryptocurrency', Commodity:'Commodity', Index:'Market Index',

const SAVED_KEY = 'ie_saved_reports';

function getSavedReports() {
  return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]');
}

function saveFinBotReport() {
  // If already saved — navigate to Saved tab
  if (finbotState.savedId) { switchTab('saved'); return; }
  if (!finbotState.result) return;
  const modeObj = FINBOT_MODES.find(m => m.id === finbotState.mode);
  const reports  = getSavedReports();
  const report   = {
    id:        Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    modeId:    modeObj.id,
    modeTitle: modeObj.title,
    modeSub:   modeObj.sub,
    modeCol:   modeObj.col,
    modeIcon:  modeObj.icon,
    content:   finbotState.result,
    savedAt:   Date.now(),
  };
  reports.unshift(report);
  localStorage.setItem(SAVED_KEY, JSON.stringify(reports));
  finbotState.savedId = report.id;
  renderFinBot();
  updateSavedBadge();
  showToast('Report saved! View it in the Saved tab.');
}

function deleteSavedReport(id) {
  const reports = getSavedReports().filter(r => r.id !== id);
  localStorage.setItem(SAVED_KEY, JSON.stringify(reports));
  updateSavedBadge();
  renderSaved();
}

function downloadReport(id) {
  const r = getSavedReports().find(r => r.id === id);
  if (!r) return;
  const date     = new Date(r.savedAt).toISOString().slice(0, 10);
  const filename = `${r.modeTitle.replace(/\s+/g, '-')}_${date}.md`;
  const blob     = new Blob([r.content], { type: 'text/markdown' });
  const a        = document.createElement('a');
  a.href         = URL.createObjectURL(blob);
  a.download     = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function shareReport(id) {
  const r = getSavedReports().find(r => r.id === id);
  if (!r) return;
  const text = `${r.modeTitle} by ${r.modeSub}\n\n${r.content}`;
  if (navigator.share) {
    try { await navigator.share({ title: r.modeTitle, text }); return; } catch(e) { /* fall through */ }
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard!');
  } catch(e) { showToast('Could not copy — try downloading instead.'); }
}

function viewSavedReport(id) {
  const r = getSavedReports().find(r => r.id === id);
  if (!r) return;
  finbotState.mode    = r.modeId;
  finbotState.result  = r.content;
  finbotState.loading = false;
  finbotState.error   = null;
  finbotState.savedId = r.id;
  switchTab('finbot');
}

function updateSavedBadge() {
  const badge = document.getElementById('saved-badge');
  if (badge) badge.style.display = getSavedReports().length > 0 ? 'block' : 'none';
}

function renderSaved() {
  const el      = document.getElementById('tab-saved');
  const reports = getSavedReports();

  if (!reports.length) {
    el.innerHTML = `
      <div class="section-title"><h2>Saved Reports</h2></div>
      <div class="saved-empty">
        <div class="saved-empty-icon">🔖</div>

          Run any analysis in FinBot and tap <strong style="color:var(--text)">🔖 Save Report</strong> to keep it here.
        </p>
      </div>`;

  }

  el.innerHTML = `
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <div>

        <p style="font-size:12px;color:var(--faint);margin-top:4px">${reports.length} report${reports.length !== 1 ? 's' : ''} saved locally</p>
      </div>
      <button onclick="if(confirm('Delete all saved reports?')){localStorage.removeItem(SAVED_KEY);updateSavedBadge();renderSaved()}"
        style="font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:8px">Clear all</button>
    </div>
    ${reports.map(r => {
      const date    = new Date(r.savedAt);
      const dateStr = date.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
      const timeStr = date.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      const preview = r.content.replace(/[#*_`>~\[\]]/g, '').replace(/\n+/g, ' ').trim().slice(0, 180);
      return `
        <div class="saved-card">
          <div class="saved-card-header">
            <div class="saved-card-meta">
              <div class="saved-card-icon" style="background:${r.modeCol}22">${r.modeIcon}</div>
              <div>
                <div class="saved-card-title">${r.modeTitle}</div>
                <div class="saved-card-sub">by ${r.modeSub} &nbsp;·&nbsp; ${dateStr}, ${timeStr}</div>
              </div>
            </div>
            <button onclick="deleteSavedReport('${r.id}')"
              style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--faint);padding:2px 4px;flex-shrink:0;line-height:1" title="Delete">✕</button>
          </div>
          <div class="saved-preview">${escHtml(preview)}</div>
          <div class="saved-card-actions">
            <button class="saved-action-btn" style="background:${r.modeCol}18;color:${r.modeCol}"

              View Full Report
            </button>
            <button class="saved-action-btn" style="background:var(--border);color:var(--text)"
              onclick="downloadReport('${r.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 3v13M7 12l5 5 5-5"/><path d="M5 20h14"/></svg>
              Download .md
            </button>
            <button class="saved-action-btn" style="background:var(--border);color:var(--text)"
              onclick="shareReport('${r.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share / Copy
            </button>
          </div>
        </div>
      `;
    }).join('')}
  `;
}

function showToast(msg, duration = 2400) {
  let t = document.getElementById('ie-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'ie-toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(-90px)'; }, duration);
}

let portChart = null;
let portPerfChart = null;

// ─── Interactive Donut Chart (Canvas) ────────────────────────────────────────
function makeDonut(canvasEl, segments) {
  // segments: [{label, pct, color}]
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const SIZE = 140, cx = 70, cy = 70, OUTER = 57, INNER = 33;
  canvasEl.width  = SIZE * dpr;
  canvasEl.height = SIZE * dpr;
  canvasEl.style.width  = SIZE + 'px';
  canvasEl.style.height = SIZE + 'px';
  const ctx = canvasEl.getContext('2d');
  ctx.scale(dpr, dpr);
  let hov = -1;

  function draw() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    let start = -Math.PI / 2;
    segments.forEach((seg, i) => {
      const sweep = (seg.pct / 100) * Math.PI * 2;
      const isH = i === hov;
      ctx.save();
      if (isH) ctx.translate(Math.cos(start + sweep / 2) * 4, Math.sin(start + sweep / 2) * 4);
      ctx.beginPath();
      ctx.arc(cx, cy, isH ? OUTER + 5 : OUTER, start, start + sweep);
      ctx.arc(cx, cy, INNER, start + sweep, start, true);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.globalAlpha = isH ? 1 : 0.86;
      ctx.fill();
      ctx.restore();
      start += sweep;
    });
    ctx.globalAlpha = 1;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const textCol = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#1e293b';
    if (hov >= 0) {
      const s = segments[hov];
      ctx.fillStyle = textCol;
      ctx.font = 'bold 13px system-ui,sans-serif';
      ctx.fillText(s.label, cx, cy - 7);
      ctx.fillStyle = '#64748b';
      ctx.font = '11px system-ui,sans-serif';
      ctx.fillText(s.pct.toFixed(1) + '%', cx, cy + 9);
    } else {
      ctx.fillStyle = '#94a3b8';
      ctx.font = 'bold 9px system-ui,sans-serif';
      ctx.fillText('ALLOCATION', cx, cy - 6);
      ctx.font = '9px system-ui,sans-serif';
      ctx.fillText(segments.length + ' holdings', cx, cy + 7);
    }
  }

  function hitIdx(mx, my) {
    const dx = mx - cx, dy = my - cy, d = Math.sqrt(dx * dx + dy * dy);
    if (d < INNER || d > OUTER + 8) return -1;
    let a = Math.atan2(dy, dx) + Math.PI / 2;
    if (a < 0) a += Math.PI * 2;
    let start = 0;
    for (let i = 0; i < segments.length; i++) {
      const sweep = (segments[i].pct / 100) * Math.PI * 2;
      if (a >= start && a < start + sweep) return i;
      start += sweep;
    }
    return segments.length - 1;
  }

  canvasEl.style.cursor = 'pointer';
  canvasEl.addEventListener('mousemove', e => {
    const r = canvasEl.getBoundingClientRect();
    const i = hitIdx(e.clientX - r.left, e.clientY - r.top);
    if (i !== hov) { hov = i; draw(); }
  });
  canvasEl.addEventListener('mouseleave', () => { if (hov !== -1) { hov = -1; draw(); } });
  canvasEl.addEventListener('click', e => {
    const r = canvasEl.getBoundingClientRect();
    const i = hitIdx(e.clientX - r.left, e.clientY - r.top);
    hov = i === hov ? -1 : i; draw();
  });
  draw();
}

// ─── Portfolio Performance Chart with period tabs ─────────────────────────────
function createPerfChart(container, data, color, height) {
  if (!container || !data.length) return null;
  container.innerHTML = '';
  const chart = LightweightCharts.createChart(container, {
    width: container.clientWidth || 300, height,
    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#94a3b8' },
    grid: { vertLines: { visible: false }, horzLines: { color: '#1e293b30' } },
    crosshair: {
      mode: 1,
      vertLine: { color: color + '80', labelBackgroundColor: color },
      horzLine: { color: color + '80', labelBackgroundColor: color },
    },
    rightPriceScale: { borderVisible: false, textColor: '#94a3b8' },
    timeScale: { borderVisible: false, timeVisible: false },
    handleScroll: false, handleScale: false,
  });
  const series = chart.addAreaSeries({
    lineColor: color, lineWidth: 2.5,
    topColor: color + '35', bottomColor: color + '00',
    priceLineVisible: false, lastValueVisible: true,
    crosshairMarkerRadius: 5, crosshairMarkerBackgroundColor: color,
  });
  series.setData(data.map((d, i) => ({ time: i + 1, value: d.value })));
  chart.timeScale().fitContent();
  return chart;
}

function initPerfChart(allData, color) {
  const wrap = document.getElementById('port-perf-wrap');
  if (!wrap) return;
  const chartEl = wrap.querySelector('.perf-chart-area');
  if (!chartEl) return;
  function renderRange(range) {
    let slice = allData;
    if (range === '1m') slice = allData.slice(-4);
    else if (range === '3m') slice = allData.slice(-3);
    else if (range === '6m') slice = allData.slice(-6);
    if (portPerfChart) { try { portPerfChart.remove(); } catch (e) {} portPerfChart = null; }
    portPerfChart = createPerfChart(chartEl, slice.map((p, i) => ({ time: i + 1, value: p.v })), color, 170);
  }
  wrap.querySelectorAll('.perf-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.perf-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRange(btn.dataset.range);
    });
  });
  renderRange('1y');
}

// Simulate portfolio history from cost→current over 12 monthly points
function genPortHistory(totalCost, total) {
  const base  = totalCost * 0.95;
  const range = total - base;
  return Array.from({ length: 12 }, (_, i) => {
    const t    = i / 11;
    const ease = t * t * (3 - 2 * t);
    const noise = (Math.sin(i * 2.3) * 0.03 + Math.cos(i * 1.7) * 0.02) * base;
    return { t: i, v: Math.max(0, base + range * ease + noise) };
  });
}

const SETTINGS_DEFAULTS = {
  name: '', email: '', username: '',
  notifications: true, priceAlerts: true, newsletter: false,
  currency: 'USD', hideBalances: false,
  defaultRisk: 'Moderate', defaultHorizon: '1–5 years', defaultSectors: 'Tech, Finance',
};

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('ie_settings') || '{}');
    return Object.assign({}, SETTINGS_DEFAULTS, saved);
  } catch(e) { return Object.assign({}, SETTINGS_DEFAULTS); }
}

function saveSettings(updates) {
  const current = loadSettings();
  const next = Object.assign(current, updates);
  localStorage.setItem('ie_settings', JSON.stringify(next));
  saveSettingsToDB(updates);
  renderSettings();
  // Re-render portfolio immediately when display-affecting settings change
  if ('currency' in updates || 'hideBalances' in updates) {
    const portTab = document.getElementById('tab-portfolio');
    if (portTab && portTab.classList.contains('active')) renderPortfolio();
  }
}

function getInitials(name) {
  return name.split(' ').filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('');
}

function getAvatarColor(name) {
  const colors = ['#10b981','#3b82f6','#8b5cf6','#f59e0b','#ec4899','#06b6d4','#ef4444'];
  let h = 0; for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return colors[Math.abs(h) % colors.length];
}

function openEditModal() {
  // Always prefer live currentUser data over stale localStorage values
  document.getElementById('modal-name').value     = currentUser ? (currentUser.name     || '') : '';
  document.getElementById('modal-email').value    = currentUser ? (currentUser.email    || '') : '';
  document.getElementById('modal-username').value = currentUser ? (currentUser.username || '') : '';
  const errEl = document.getElementById('edit-profile-error');
  if (errEl) { errEl.textContent = ''; errEl.classList.remove('show'); }
  document.getElementById('edit-profile-modal').classList.remove('hidden');
}

function closeEditModal() {
  document.getElementById('edit-profile-modal').classList.add('hidden');
}

async function saveProfile() {
  const name     = document.getElementById('modal-name').value.trim();
  const email    = document.getElementById('modal-email').value.trim();
  const username = document.getElementById('modal-username').value.trim().replace(/^@/, '');
  const errEl    = document.getElementById('edit-profile-error');
  const saveBtn  = document.getElementById('edit-profile-save-btn');

  const showErr = msg => { errEl.textContent = msg; errEl.classList.add('show'); };
  errEl.classList.remove('show');

  if (!name)  { showErr('Name is required.'); document.getElementById('modal-name').focus(); return; }
  if (!email) { showErr('Email is required.'); return; }
  if (!username) { showErr('Username is required.'); return; }

  saveBtn.disabled = true; saveBtn.textContent = 'Saving…';

  if (currentUser) {
    const result = await saveProfileToDB(name, email, username);
    if (result !== true) {
      showErr(result);
      saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
      return;
    }
  }
  saveSettings({ name, email, username });
  saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
  closeEditModal();
  renderSettings();
  updateHeaderUser();
}
